version: "3.8"

services:
  db:
    image: postgres
    container_name: ecom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: janganlupa123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/18/data

volumes:
  postgres-data: